<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Learning Card</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root,
      :root[data-theme="light"] {
        color-scheme: light;
        --primary: #587160;
        --primary-strong: #405747;
        --primary-foreground: #ffffff;
        --background: transparent;
        --foreground: #303832;
        --card: transparent;
        --card-foreground: #303832;
        --border: #d9ddd6;
        --muted: #e9ece6;
        --muted-foreground: #626c64;
        --faint: #f4f6f2;
        --accent: #e3e9e2;
        --danger: #956052;
        --ring: #718878;
        --radius-small: 6px;
        --radius-medium: 8px;
        --radius-large: 12px;
        --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --text-body: 1rem;
        --text-control: 0.8125rem;
        --text-caption: 0.8125rem;
        --text-title: 1.125rem;
        --text-section: 0.75rem;
        --surface-overlay: color-mix(in srgb, var(--faint) 92%, transparent);
        --surface-hover: color-mix(in srgb, var(--faint) 70%, transparent);
        --surface-subtle: color-mix(in srgb, var(--foreground) 4%, transparent);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --primary: #85bd98;
        --primary-strong: #a8d4b4;
        --primary-foreground: #111310;
        --background: transparent;
        --foreground: #f2f4ef;
        --card: transparent;
        --card-foreground: #f2f4ef;
        --border: #3a4039;
        --muted: #252925;
        --muted-foreground: #a8afa5;
        --faint: #1c201c;
        --accent: #2d332e;
        --danger: #c9958a;
        --ring: #85bd98;
        --surface-overlay: color-mix(in srgb, var(--foreground) 8%, transparent);
        --surface-hover: color-mix(in srgb, var(--foreground) 5%, transparent);
        --surface-subtle: color-mix(in srgb, var(--foreground) 4%, transparent);
      }

      html,
      body,
      .app-shell {
        background-color: transparent;
      }

      main.app-shell {
        padding-block-start: 0;
      }

      :root,
      :root[data-theme="light"],
      :root[data-theme="dark"] {
        --background: transparent;
        --card: transparent;
      }

      body {
        margin: 0;
        color: var(--foreground);
        background: transparent;
        font-family: var(--font-sans);
        font-size: var(--text-body);
        font-weight: 400;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input,
      select,
      textarea {
        font-family: inherit;
      }

      .app-shell {
        max-width: 920px;
        margin: 0 auto;
        padding: 0;
      }

      .hero {
        margin-bottom: 8px;
      }

      .gallery-viewer {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 10px;
      }

      .gallery-viewer[hidden] {
        display: none;
      }

      .hero-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .common-name {
        margin: 0;
        color: var(--primary-strong);
        font-size: 0.9375rem;
        font-weight: 600;
        line-height: 1.3;
      }

      h1 {
        margin: 0;
        font-size: var(--text-title);
        font-weight: 600;
        line-height: 1.25;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .taxon-name {
        font-style: italic;
      }

      .taxon-authorship {
        font-style: normal;
      }

      .taxon-authorship:not(:empty)::before {
        content: " ";
      }

      h2 {
        margin: 0 0 4px;
        color: var(--muted-foreground);
        font-size: var(--text-section);
        font-weight: 600;
        line-height: 1.4;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .gallery-details h2 {
        color: var(--foreground);
        font-size: var(--text-control);
        letter-spacing: 0;
        text-transform: none;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      a {
        color: var(--primary-strong);
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      article > p,
      .gallery-details > p,
      #source-comparison {
        max-width: 68ch;
      }

      ot-tabs {
        display: block;
      }

      [role="tablist"] {
        display: flex;
        width: max-content;
        max-width: 100%;
        gap: 2px;
        margin-bottom: 8px;
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: var(--radius-medium);
        background: transparent;
      }

      [role="tab"],
      .gallery-thumb {
        font-size: var(--text-control);
        font-weight: 500;
        line-height: 1.4;
      }

      [role="tab"] {
        color: var(--muted-foreground);
        border-radius: var(--radius-small);
      }

      [role="tab"]:hover {
        color: var(--foreground);
        background: var(--surface-hover);
      }

      [role="tab"][aria-selected="true"] {
        color: var(--foreground);
        background: var(--surface-subtle);
        box-shadow: none;
      }

      [role="tabpanel"] {
        padding: 10px 0 0;
      }

      .status-line {
        margin: 0;
        color: var(--muted-foreground);
        font-size: var(--text-section);
        line-height: 1.35;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .overview-stack {
        display: grid;
        gap: 0;
      }

      .overview-stack article + article {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
      }

      .gallery-viewer:focus {
        outline: none;
      }

      .gallery-stage {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: start;
      }

      .gallery-frame-wrap {
        position: relative;
        min-width: 0;
      }

      .gallery-nav {
        position: absolute;
        top: 50%;
        z-index: 1;
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--foreground);
        background: var(--surface-overlay);
        font-size: 1.125rem;
        line-height: 1;
        cursor: pointer;
        transform: translateY(-50%);
        transition: border-color 120ms ease, background-color 120ms ease;
      }

      .gallery-nav:hover {
        border-color: var(--ring);
        background: var(--surface-hover);
      }

      .gallery-nav:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .gallery-nav--prev {
        left: 8px;
      }

      .gallery-nav--next {
        right: 8px;
      }

      .gallery-details {
        align-self: start;
        min-width: 0;
      }

      .gallery-details > p {
        font-size: var(--text-control);
        line-height: 1.45;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 4;
        overflow: hidden;
      }

      .gallery-frame {
        position: relative;
        aspect-ratio: 4 / 3;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: var(--radius-medium);
        background: transparent;
      }

      .gallery-frame img {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .gallery-meta {
        margin-top: 6px;
        color: var(--muted-foreground);
        font-size: var(--text-control);
        line-height: 1.4;
      }

      .gallery-source {
        display: inline-block;
        margin-top: 8px;
        font-size: var(--text-control);
        font-weight: 500;
        line-height: 1.4;
      }

      .gallery-counter {
        margin-top: 2px;
        color: var(--muted-foreground);
        font-size: var(--text-section);
        line-height: 1.4;
      }

      .gallery-filmstrip {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        padding: 2px 0;
      }

      .gallery-thumb {
        flex: 0 0 72px;
        width: 72px;
        min-width: 72px;
        padding: 3px;
        border: 1px solid var(--border);
        border-radius: var(--radius-medium);
        color: var(--foreground);
        background: var(--surface-subtle);
        scroll-snap-align: center;
        transition: border-color 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
      }

      .gallery-thumb[aria-selected="true"] {
        border-color: var(--ring);
        background: var(--surface-hover);
        box-shadow: 0 0 0 2px rgb(113 136 120 / 0.13);
      }

      .gallery-thumb img {
        display: block;
        width: 66px;
        height: 50px;
        border-radius: 5px;
        object-fit: cover;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      article + article {
        margin-top: 14px;
      }

      ul {
        margin: 0;
        padding-left: 20px;
        line-height: 1.5;
      }

      .source-links {
        display: grid;
        gap: 8px;
        list-style: none;
        padding-left: 0;
      }

      .source-item {
        margin: 0;
      }

      .source-row {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: inherit;
        text-decoration: none;
      }

      a.source-row:hover .source-name {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .source-icon {
        flex: 0 0 16px;
        width: 16px;
        height: 16px;
        border-radius: 3px;
        object-fit: contain;
        background: var(--faint);
      }

      .source-name {
        font-size: var(--text-control);
        font-weight: 600;
        line-height: 1.45;
      }

      .source-detail {
        margin: 2px 0 0;
        color: var(--muted-foreground);
        font-size: 0.6875rem;
        line-height: 1.35;
      }

      .source-empty {
        margin: 0;
        color: var(--muted-foreground);
        font-size: var(--text-control);
        line-height: 1.45;
      }

      @media (min-width: 640px) {
        .gallery-stage {
          grid-template-columns: 1.4fr 1fr;
        }
      }

      @media (max-width: 680px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="hero-text">
          <p class="common-name" id="display-name">Loading...</p>
          <h1><i class="taxon-name" id="scientific-name">Plant profile</i><span class="taxon-authorship" id="scientific-authorship"></span></h1>
          <p class="status-line" id="status-line"></p>
        </div>
      </section>

      <section class="gallery-viewer" id="gallery-viewer" aria-label="Photo gallery" tabindex="-1" hidden>
        <div class="gallery-stage">
          <div class="gallery-frame-wrap">
            <button type="button" class="gallery-nav gallery-nav--prev" id="gallery-prev" aria-label="Previous photo" hidden>‹</button>
            <div class="gallery-frame" id="gallery-frame"></div>
            <button type="button" class="gallery-nav gallery-nav--next" id="gallery-next" aria-label="Next photo" hidden>›</button>
          </div>
          <div class="gallery-details">
            <h2 id="gallery-title">Photos</h2>
            <p class="gallery-counter" id="gallery-counter" hidden></p>
            <p id="gallery-caption"></p>
            <p class="gallery-meta" id="gallery-credit"></p>
            <a class="gallery-source" id="gallery-source" href="#" target="_blank" rel="noreferrer">Open source image</a>
          </div>
        </div>
        <div class="gallery-filmstrip" id="gallery-thumbnails" role="tablist" aria-label="Gallery photos"></div>
        <p class="visually-hidden" id="gallery-announce" aria-live="polite"></p>
      </section>

      <ot-tabs>
        <div role="tablist" aria-label="Plant profile sections">
          <button role="tab" type="button" aria-selected="true">Overview</button>
          <button role="tab" type="button">How to recognise</button>
        </div>

        <section role="tabpanel" id="overview">
          <div class="overview-stack">
            <article>
              <h2>At a glance</h2>
              <p id="summary"></p>
            </article>
            <article>
              <h2>Habitat</h2>
              <p id="habitat"></p>
            </article>
            <article>
              <h2>Distribution</h2>
              <p id="distribution"></p>
            </article>
            <article>
              <h2>Names</h2>
              <p id="common-names"></p>
            </article>
            <article>
              <h2>Sources</h2>
              <ul class="source-links" id="source-comparison"></ul>
            </article>
          </div>
        </section>

        <section role="tabpanel" id="recognise">
          <article>
            <h2>Diagnostic features</h2>
            <p id="diagnostic"></p>
          </article>
          <article>
            <h2>Description</h2>
            <p id="description"></p>
          </article>
          <article>
            <h2>Taxonomic notes</h2>
            <p id="similarity"></p>
          </article>
        </section>

      </ot-tabs>
    </main>

    <script type="module" src="./src/plant-learning-card.ts"></script>
  </body>
</html>
