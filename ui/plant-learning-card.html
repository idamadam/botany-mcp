<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Learning Card</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        color-scheme: light;
        --primary: #587160;
        --primary-strong: #405747;
        --primary-foreground: #ffffff;
        --background: transparent;
        --foreground: #303832;
        --card: transparent;
        --card-foreground: #303832;
        --border: #d9ddd6;
        --muted: #e9ece6;
        --muted-foreground: #626c64;
        --faint: #f4f6f2;
        --accent: #e3e9e2;
        --danger: #956052;
        --ring: #718878;
        --radius-small: 6px;
        --radius-medium: 8px;
        --radius-large: 12px;
        --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --text-body: 1rem;
        --text-control: 0.8125rem;
        --text-caption: 0.8125rem;
        --text-title: 1.125rem;
        --text-section: 0.75rem;
      }

      body {
        margin: 0;
        color: var(--foreground);
        background: transparent;
        font-family: var(--font-sans);
        font-size: var(--text-body);
        font-weight: 400;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input,
      select,
      textarea {
        font-family: inherit;
      }

      .app-shell {
        max-width: 920px;
        margin: 0 auto;
        padding: 0;
      }

      .hero {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        margin-bottom: 10px;
      }

      .hero-image {
        position: relative;
        flex: 0 0 96px;
        width: 96px;
        height: 96px;
        overflow: hidden;
        border-radius: var(--radius-medium);
        background: var(--muted);
      }

      .hero-image[hidden] {
        display: none;
      }

      .hero-image img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .image-credit {
        display: none;
      }

      .hero-text {
        flex: 1;
        min-width: 0;
        padding: 0;
      }

      .common-name {
        margin: 0 0 2px;
        color: var(--primary-strong);
        font-size: 0.9375rem;
        font-weight: 600;
        line-height: 1.4;
      }

      h1 {
        margin: 0;
        font-size: var(--text-title);
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .taxon-name {
        font-style: italic;
      }

      .taxon-authorship {
        font-style: normal;
      }

      .taxon-authorship:not(:empty)::before {
        content: " ";
      }

      h2 {
        margin: 0 0 4px;
        color: var(--muted-foreground);
        font-size: var(--text-section);
        font-weight: 600;
        line-height: 1.4;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .gallery-details h2 {
        color: var(--foreground);
        font-size: var(--text-control);
        letter-spacing: 0;
        text-transform: none;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      a {
        color: var(--primary-strong);
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      article > p,
      .gallery-details > p,
      #source-comparison {
        max-width: 68ch;
      }

      ot-tabs {
        display: block;
      }

      [role="tablist"] {
        display: flex;
        width: max-content;
        max-width: 100%;
        gap: 2px;
        margin-bottom: 8px;
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: var(--radius-medium);
        background: var(--muted);
      }

      [role="tab"],
      .gallery-thumb {
        font-size: var(--text-control);
        font-weight: 500;
        line-height: 1.4;
      }

      [role="tab"] {
        color: var(--muted-foreground);
        border-radius: var(--radius-small);
      }

      [role="tab"]:hover {
        color: var(--foreground);
        background: rgb(255 255 255 / 0.42);
      }

      [role="tab"][aria-selected="true"] {
        color: var(--foreground);
        background: var(--faint);
        box-shadow: 0 1px 2px rgb(42 53 45 / 0.08);
      }

      [role="tabpanel"] {
        padding: 10px 0 0;
      }

      .status-line {
        margin-top: 6px;
        color: var(--muted-foreground);
        font-size: var(--text-section);
        line-height: 1.4;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .overview-stack {
        display: grid;
        gap: 0;
      }

      .overview-stack article + article {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
      }

      .gallery-stage {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: start;
      }

      .gallery-details {
        align-self: start;
        min-width: 0;
      }

      .gallery-details > p {
        font-size: var(--text-control);
        line-height: 1.45;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 4;
        overflow: hidden;
      }

      .gallery-frame {
        position: relative;
        aspect-ratio: 4 / 3;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: var(--radius-medium);
        background: var(--muted);
      }

      .gallery-frame img {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .gallery-meta {
        margin-top: 6px;
        color: var(--muted-foreground);
        font-size: var(--text-control);
        line-height: 1.4;
      }

      .gallery-source {
        display: inline-block;
        margin-top: 8px;
        font-size: var(--text-control);
        font-weight: 500;
        line-height: 1.4;
      }

      .gallery-thumbnails {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .gallery-thumb {
        display: grid;
        grid-template-rows: auto minmax(0, auto);
        gap: 4px;
        min-width: 0;
        min-height: 0;
        padding: 5px;
        border: 1px solid var(--border);
        border-radius: var(--radius-medium);
        color: var(--foreground);
        background: var(--faint);
        text-align: left;
        transition: border-color 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
      }

      .gallery-thumb[aria-pressed="true"] {
        border-color: var(--ring);
        background: var(--faint);
        box-shadow: 0 0 0 2px rgb(113 136 120 / 0.13);
      }

      .gallery-thumb img {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        border-radius: 5px;
        object-fit: cover;
      }

      .gallery-thumb span {
        min-width: 0;
        font-size: 0.6875rem;
        line-height: 1.35;
        overflow-wrap: anywhere;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
      }

      article + article {
        margin-top: 14px;
      }

      ul {
        margin: 0;
        padding-left: 20px;
        line-height: 1.5;
      }

      .source-links {
        display: grid;
        gap: 8px;
        list-style: none;
        padding-left: 0;
      }

      .source-item {
        margin: 0;
      }

      .source-row {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: inherit;
        text-decoration: none;
      }

      a.source-row:hover .source-name {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .source-icon {
        flex: 0 0 16px;
        width: 16px;
        height: 16px;
        border-radius: 3px;
        object-fit: contain;
        background: var(--faint);
      }

      .source-name {
        font-size: var(--text-control);
        font-weight: 600;
        line-height: 1.45;
      }

      .source-detail {
        margin: 2px 0 0;
        color: var(--muted-foreground);
        font-size: 0.6875rem;
        line-height: 1.35;
      }

      .source-empty {
        margin: 0;
        color: var(--muted-foreground);
        font-size: var(--text-control);
        line-height: 1.45;
      }

      @media (max-width: 480px) {
        .hero {
          flex-direction: column;
        }

        .hero-image {
          flex: 0 0 auto;
          width: 80px;
          height: 80px;
        }
      }

      @media (max-width: 680px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="hero-image" id="hero-image" hidden></div>
        <div class="hero-text">
          <p class="common-name" id="display-name">Loading...</p>
          <h1><i class="taxon-name" id="scientific-name">Plant profile</i><span class="taxon-authorship" id="scientific-authorship"></span></h1>
          <p class="status-line" id="status-line"></p>
        </div>
      </section>

      <ot-tabs>
        <div role="tablist" aria-label="Plant profile sections">
          <button role="tab" type="button" aria-selected="true">Overview</button>
          <button role="tab" type="button">Photos</button>
          <button role="tab" type="button">How to recognise</button>
        </div>

        <section role="tabpanel" id="overview">
          <div class="overview-stack">
            <article>
              <h2>At a glance</h2>
              <p id="summary"></p>
            </article>
            <article>
              <h2>Habitat</h2>
              <p id="habitat"></p>
            </article>
            <article>
              <h2>Distribution</h2>
              <p id="distribution"></p>
            </article>
            <article>
              <h2>Names</h2>
              <p id="common-names"></p>
            </article>
            <article>
              <h2>Sources</h2>
              <ul class="source-links" id="source-comparison"></ul>
            </article>
          </div>
        </section>

        <section role="tabpanel" id="photos">
          <div class="gallery-stage">
            <div class="gallery-frame" id="gallery-frame"></div>
            <div class="gallery-details">
              <h2 id="gallery-title">Photos</h2>
              <p id="gallery-caption"></p>
              <p class="gallery-meta" id="gallery-credit"></p>
              <a class="gallery-source" id="gallery-source" href="#" target="_blank" rel="noreferrer">Open source image</a>
            </div>
          </div>
          <div class="gallery-thumbnails" id="gallery-thumbnails"></div>
        </section>

        <section role="tabpanel" id="recognise">
          <article>
            <h2>Diagnostic features</h2>
            <p id="diagnostic"></p>
          </article>
          <article>
            <h2>Description</h2>
            <p id="description"></p>
          </article>
          <article>
            <h2>Taxonomic notes</h2>
            <p id="similarity"></p>
          </article>
        </section>

      </ot-tabs>
    </main>

    <script type="module" src="./src/plant-learning-card.ts"></script>
  </body>
</html>
