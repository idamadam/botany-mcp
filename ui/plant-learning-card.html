<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Learning Card</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root,
      :root[data-theme="light"] {
        color-scheme: light;
        --primary: #587160;
        --primary-strong: #405747;
        --primary-foreground: #ffffff;
        --background: transparent;
        --foreground: #303832;
        --card: transparent;
        --card-foreground: #303832;
        --border: #d9ddd6;
        --muted: #e9ece6;
        --muted-foreground: #626c64;
        --faint: #f4f6f2;
        --accent: #e3e9e2;
        --danger: #956052;
        --ring: #718878;
        --radius-small: 6px;
        --radius-medium: 8px;
        --radius-large: 12px;
        --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --text-body: 1rem;
        --text-control: 0.8125rem;
        --text-caption: 0.8125rem;
        --text-title: 1.125rem;
        --text-section: 0.75rem;
        --app-inset: 14px;
        --surface-overlay: color-mix(in srgb, var(--faint) 92%, transparent);
        --surface-hover: color-mix(in srgb, var(--faint) 70%, transparent);
        --surface-subtle: color-mix(in srgb, var(--foreground) 4%, transparent);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --primary: #85bd98;
        --primary-strong: #a8d4b4;
        --primary-foreground: #111310;
        --background: transparent;
        --foreground: #f2f4ef;
        --card: transparent;
        --card-foreground: #f2f4ef;
        --border: #3a4039;
        --muted: #252925;
        --muted-foreground: #a8afa5;
        --faint: #1c201c;
        --accent: #2d332e;
        --danger: #c9958a;
        --ring: #85bd98;
        --surface-overlay: color-mix(in srgb, var(--foreground) 8%, transparent);
        --surface-hover: color-mix(in srgb, var(--foreground) 5%, transparent);
        --surface-subtle: color-mix(in srgb, var(--foreground) 4%, transparent);
      }

      html,
      body,
      .app-shell {
        background-color: transparent;
      }

      main.app-shell {
        padding: var(--app-inset);
      }

      :root,
      :root[data-theme="light"],
      :root[data-theme="dark"] {
        --background: transparent;
        --card: transparent;
      }

      body {
        margin: 0;
        color: var(--foreground);
        background: transparent;
        font-family: var(--font-sans);
        font-size: var(--text-body);
        font-weight: 400;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input,
      select,
      textarea {
        font-family: inherit;
      }

      .app-shell {
        max-width: 920px;
        margin: 0 auto;
      }

      .card-body[hidden],
      .card-placeholder[hidden],
      .section-block[hidden],
      .warnings-banner[hidden] {
        display: none;
      }

      .card-placeholder {
        display: grid;
        gap: 10px;
        padding: 2px 0 4px;
      }

      .placeholder-line {
        height: 14px;
        border-radius: 6px;
        background: var(--surface-subtle);
        animation: placeholder-pulse 1.4s ease-in-out infinite;
      }

      .placeholder-line--title {
        width: 42%;
        height: 16px;
      }

      .placeholder-line--subtitle {
        width: 72%;
        height: 22px;
      }

      .placeholder-line--meta {
        width: 56%;
        height: 12px;
      }

      .placeholder-block {
        aspect-ratio: 4 / 3;
        max-height: 220px;
        border: 1px solid var(--border);
        border-radius: var(--radius-medium);
        background: var(--surface-subtle);
        animation: placeholder-pulse 1.4s ease-in-out infinite;
      }

      @keyframes placeholder-pulse {
        50% {
          opacity: 0.55;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .placeholder-line,
        .placeholder-block {
          animation: none;
        }
      }

      .hero {
        margin-bottom: 14px;
      }

      .hero-text {
        display: grid;
        gap: 3px;
        max-width: 68ch;
      }

      .hero h1 {
        margin: 0;
        font-size: var(--text-title);
        font-weight: 600;
        font-style: italic;
        line-height: 1.2;
        letter-spacing: 0;
        text-wrap: balance;
        color: var(--foreground);
      }

      .hero-common {
        margin: 0;
        font-size: var(--text-control);
        font-weight: 500;
        line-height: 1.4;
        color: var(--muted-foreground);
      }

      .hero-aliases {
        margin: 0;
        font-size: var(--text-section);
        line-height: 1.4;
      }

      .hero-meta {
        margin: 2px 0 0;
      }

      h2 {
        margin: 0;
        font-size: var(--text-body);
        font-weight: 600;
        line-height: 1.4;
        letter-spacing: 0;
        text-transform: none;
        color: var(--foreground);
      }

      .spot-one-liner {
        color: var(--foreground);
        font-size: var(--text-body);
        margin-bottom: 8px;
        font-weight: 500;
        line-height: 1.5;
      }

      .text-muted {
        color: var(--muted-foreground);
        font-size: var(--text-control);
        line-height: 1.45;
      }

      .content-flow {
        display: grid;
        gap: 8px;
        max-width: 68ch;
      }

      .content-flow > p {
        margin: 0;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      a {
        color: var(--primary-strong);
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      .status-chip,
      .group-line,
      .common-name {
        display: none;
      }

      .warnings-banner {
        margin-top: 8px;
        padding: 8px 10px;
        border: 1px solid color-mix(in srgb, var(--danger) 35%, var(--border));
        border-radius: var(--radius-medium);
        color: var(--danger);
        font-size: var(--text-control);
        background: color-mix(in srgb, var(--danger) 8%, transparent);
      }

      .section-block {
        margin-bottom: 16px;
      }

      .section-block > p,
      .field-marks,
      .source-links,
      .content-flow {
        max-width: 68ch;
      }

      .field-marks:empty,
      .field-marks[hidden] {
        display: none;
      }

      .field-marks {
        margin: 0;
        padding-left: 18px;
      }

      .field-marks li + li {
        margin-top: 4px;
      }

      .gallery-viewer {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 14px;
      }

      .gallery-viewer[hidden] {
        display: none;
      }

      .gallery-group-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 0;
        background: transparent;
        border-radius: 0;
      }

      .gallery-group-tabs[hidden],
      .gallery-group-tabs:empty {
        display: none;
      }

      .gallery-group-tab {
        padding: 4px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--muted-foreground);
        font-size: var(--text-control);
        font-weight: 500;
        line-height: 1.4;
        background: transparent;
        cursor: pointer;
      }

      .gallery-group-tab[aria-selected="true"] {
        border-color: var(--ring);
        color: var(--foreground);
        background: var(--surface-subtle);
      }

      .gallery-stage {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: start;
      }

      .gallery-frame-wrap {
        position: relative;
        min-width: 0;
      }

      .gallery-nav {
        position: absolute;
        top: 50%;
        z-index: 1;
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--foreground);
        background: var(--surface-overlay);
        font-size: 1.125rem;
        line-height: 1;
        cursor: pointer;
        transform: translateY(-50%);
      }

      .gallery-nav:hover {
        border-color: var(--ring);
        background: var(--surface-hover);
      }

      .gallery-nav:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .gallery-nav--prev {
        left: 8px;
      }

      .gallery-nav--next {
        right: 8px;
      }

      .gallery-details {
        align-self: start;
        min-width: 0;
      }

      .gallery-figure-label {
        margin: 0 0 4px;
        font-size: var(--text-control);
        font-weight: 600;
        line-height: 1.4;
      }

      .gallery-details > p {
        font-size: var(--text-control);
        line-height: 1.45;
      }

      .gallery-frame {
        position: relative;
        aspect-ratio: 4 / 3;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: var(--radius-medium);
        background: transparent;
      }

      .gallery-frame img {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .gallery-meta {
        margin-top: 6px;
        color: var(--muted-foreground);
        font-size: var(--text-control);
        line-height: 1.4;
      }

      .gallery-source {
        display: inline-block;
        margin-top: 8px;
        font-size: var(--text-control);
        font-weight: 500;
        line-height: 1.4;
      }

      .gallery-counter {
        margin-top: 2px;
        color: var(--muted-foreground);
        font-size: var(--text-section);
        line-height: 1.4;
      }

      .gallery-filmstrip {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        padding: 2px 0;
        background: transparent;
        border-radius: 0;
      }

      .gallery-filmstrip[hidden],
      .gallery-filmstrip:empty {
        display: none;
      }

      .gallery-thumb {
        flex: 0 0 72px;
        width: 72px;
        min-width: 72px;
        padding: 3px;
        border: 1px solid var(--border);
        border-radius: var(--radius-medium);
        color: var(--foreground);
        font-size: var(--text-control);
        font-weight: 500;
        line-height: 1.4;
        background: transparent;
        scroll-snap-align: center;
        cursor: pointer;
      }

      .gallery-thumb[aria-selected="true"] {
        border-color: var(--ring);
        background: color-mix(in srgb, var(--ring) 6%, transparent);
        box-shadow: 0 0 0 2px rgb(113 136 120 / 0.13);
      }

      .gallery-thumb img {
        display: block;
        width: 66px;
        height: 50px;
        border-radius: 5px;
        object-fit: cover;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .disclosure-body {
        display: grid;
        gap: 12px;
        padding: 0 16px 14px;
      }

      .card-body details {
        border: 1px solid var(--border);
        border-radius: var(--radius-medium);
        overflow: hidden;
      }

      .card-body details + details {
        margin-top: 0;
        border-start-start-radius: var(--radius-medium);
        border-start-end-radius: var(--radius-medium);
      }

      .card-body details:has(+ details) {
        border-end-start-radius: var(--radius-medium);
        border-end-end-radius: var(--radius-medium);
      }

      .card-body details summary {
        color: var(--foreground);
        font-size: var(--text-control);
        font-weight: 600;
      }

      .card-body details summary::before {
        content: none;
      }

      .card-disclosures {
        display: grid;
        gap: 8px;
        margin-top: 4px;
      }

      .card-disclosures details + details {
        margin-top: 0;
      }

      .name-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        max-width: 68ch;
      }

      .name-tag {
        padding: 2px 8px;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--foreground);
        font-size: var(--text-control);
        line-height: 1.4;
        background: var(--surface-subtle);
      }

      .naming-meta {
        margin-top: 8px;
        color: var(--muted-foreground);
        font-size: var(--text-control);
      }

      ul {
        margin: 0;
        padding-left: 20px;
        line-height: 1.5;
      }

      .source-links {
        display: grid;
        gap: 8px;
        list-style: none;
        padding-left: 0;
      }

      .source-item {
        margin: 0;
      }

      .source-row {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: inherit;
        text-decoration: none;
      }

      a.source-row:hover .source-name {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .source-name {
        font-size: var(--text-control);
        font-weight: 600;
        line-height: 1.45;
      }

      .source-detail {
        margin: 2px 0 0;
        color: var(--muted-foreground);
        font-size: 0.6875rem;
        line-height: 1.35;
      }

      .source-icon {
        flex: 0 0 16px;
        width: 16px;
        height: 16px;
        border-radius: 3px;
        object-fit: contain;
        background: var(--faint);
      }

      .empty-note {
        color: var(--muted-foreground);
        font-size: var(--text-control);
      }

      @media (min-width: 640px) {
        .gallery-stage {
          grid-template-columns: 1.4fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell" id="app-shell" aria-busy="true">
      <div class="card-placeholder" id="card-placeholder" aria-hidden="false">
        <div class="placeholder-line placeholder-line--title"></div>
        <div class="placeholder-line placeholder-line--subtitle"></div>
        <div class="placeholder-line placeholder-line--meta"></div>
        <div class="placeholder-block"></div>
      </div>

      <div class="card-body" id="card-body" hidden>
        <section class="hero">
          <div class="hero-text">
            <h1 id="scientific-name"></h1>
            <p class="hero-common" id="common-name" hidden></p>
            <p class="hero-aliases text-muted" id="hero-aliases" hidden></p>
            <p class="hero-meta text-muted" id="hero-meta" hidden></p>
          </div>
          <div class="warnings-banner" id="warnings-banner" hidden>
            <ul id="warnings-list"></ul>
          </div>
        </section>

        <section class="section-block" id="spot-it-section" aria-label="Recognition">
          <p class="spot-one-liner" id="spot-one-liner" hidden></p>
          <ul class="field-marks" id="field-marks" hidden></ul>
        </section>

        <section class="gallery-viewer" id="gallery-viewer" aria-label="Photos" tabindex="-1" hidden>
          <div class="gallery-group-tabs" id="gallery-group-tabs" aria-label="Photo groups"></div>
          <div class="gallery-stage">
            <div class="gallery-frame-wrap">
              <button type="button" class="gallery-nav gallery-nav--prev" id="gallery-prev" aria-label="Previous photo" hidden>‹</button>
              <div class="gallery-frame" id="gallery-frame"></div>
              <button type="button" class="gallery-nav gallery-nav--next" id="gallery-next" aria-label="Next photo" hidden>›</button>
            </div>
            <div class="gallery-details">
              <p class="gallery-figure-label" id="gallery-figure-label" hidden></p>
              <p class="gallery-counter" id="gallery-counter" hidden></p>
              <p id="gallery-caption"></p>
              <p class="gallery-meta" id="gallery-credit"></p>
              <a class="gallery-source" id="gallery-source" href="#" target="_blank" rel="noreferrer">Open source image</a>
            </div>
          </div>
          <div class="gallery-filmstrip" id="gallery-thumbnails" aria-label="Gallery photos"></div>
          <p class="visually-hidden" id="gallery-announce" aria-live="polite"></p>
        </section>

        <section class="section-block content-flow" id="in-victoria-section" aria-label="In Victoria" hidden>
          <p id="in-victoria-where" hidden></p>
          <p class="text-muted" id="in-victoria-when" hidden></p>
          <p class="text-muted" id="in-victoria-conservation" hidden></p>
        </section>

        <details class="section-block" id="detail-section" hidden>
          <summary>Full description</summary>
          <div class="disclosure-body content-flow">
            <article id="description-block" hidden>
              <p id="full-description"></p>
            </article>
            <article id="national-range-block" hidden>
              <p id="national-range"></p>
            </article>
            <article id="national-habitat-block" hidden>
              <p id="national-habitat"></p>
            </article>
            <article id="confusion-block" hidden>
              <p id="confusion-notes"></p>
            </article>
          </div>
        </details>

        <div class="card-disclosures" id="card-disclosures">
          <details id="sources-section">
            <summary>Sources</summary>
            <div class="disclosure-body">
              <ul class="source-links" id="source-comparison"></ul>
            </div>
          </details>
        </div>
      </div>
    </main>

    <script type="module" src="./src/plant-learning-card.ts"></script>
  </body>
</html>
